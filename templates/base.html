<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Fitness Tracker{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Fitness</div>
        <div class="nav-links">
            <a href="{{ url_for('index') }}" class="{% if request.endpoint == 'index' %}active{% endif %}">
                <i data-lucide="home"></i> 首页
            </a>
            <a href="{{ url_for('workouts_page') }}" class="{% if request.endpoint == 'workouts_page' %}active{% endif %}">
                <i data-lucide="calendar-check"></i> 打卡
            </a>
            <a href="{{ url_for('weight_page') }}" class="{% if request.endpoint == 'weight_page' %}active{% endif %}">
                <i data-lucide="activity"></i> 体重
            </a>
            <a href="{{ url_for('export_markdown') }}" class="nav-export">
                <i data-lucide="download"></i> 导出
            </a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script>lucide.createIcons();</script>
    {% block scripts %}{% endblock %}
</body>
</html>
